name: BTC regime backtest

on:
  workflow_dispatch:
  push:
    branches: [crypto-research-runner]
    paths:
      - 'research/crypto/**'
      - '.github/workflows/crypto-backtest.yml'
  pull_request:
    paths:
      - 'research/crypto/**'
      - '.github/workflows/crypto-backtest.yml'

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: research/crypto/requirements.txt
      - run: pip install -r research/crypto/requirements.txt
      - name: Run research pipeline
        run: python research/crypto/run_fixed.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: btc-backtest-results-v2
          path: research/crypto/results_v2/
          if-no-files-found: warn
